<div>
  <h2 id="page-heading" data-cy="CamisetaHeading">
    <span jhiTranslate="wiseApp.camiseta.home.title">Camisetas</span>

    <div class="d-flex justify-content-end">
      <button class="btn btn-info mr-2" (click)="loadPage()" [disabled]="isLoading">
        <fa-icon icon="sync" [spin]="isLoading"></fa-icon>
        <span jhiTranslate="wiseApp.camiseta.home.refreshListLabel">Refresh List</span>
      </button>

      <button
        id="jh-create-entity"
        data-cy="entityCreateButton"
        class="btn btn-primary jh-create-entity create-camiseta"
        [routerLink]="['/camiseta/new']"
      >
        <fa-icon icon="plus"></fa-icon>
        <span jhiTranslate="wiseApp.camiseta.home.createLabel"> Create a new Camiseta </span>
      </button>
    </div>
  </h2>

  <jhi-alert-error></jhi-alert-error>

  <jhi-alert></jhi-alert>

  <div class="alert alert-warning" id="no-result" *ngIf="camisetas?.length === 0">
    <span jhiTranslate="wiseApp.camiseta.home.notFound">No camisetas found</span>
  </div>

  <div class="table-responsive" id="entities" *ngIf="camisetas && camisetas.length > 0">
    <table class="table table-striped" aria-describedby="page-heading">
      <thead>
        <tr jhiSort [(predicate)]="predicate" [(ascending)]="ascending" [callback]="loadPage.bind(this)">
          <th scope="col" jhiSortBy="id"><span jhiTranslate="global.field.id">ID</span> <fa-icon icon="sort"></fa-icon></th>
          <th scope="col" jhiSortBy="stock"><span jhiTranslate="wiseApp.camiseta.stock">Stock</span> <fa-icon icon="sort"></fa-icon></th>
          <th scope="col" jhiSortBy="imagen"><span jhiTranslate="wiseApp.camiseta.imagen">Imagen</span> <fa-icon icon="sort"></fa-icon></th>
          <th scope="col" jhiSortBy="talla"><span jhiTranslate="wiseApp.camiseta.talla">Talla</span> <fa-icon icon="sort"></fa-icon></th>
          <th scope="col" jhiSortBy="color"><span jhiTranslate="wiseApp.camiseta.color">Color</span> <fa-icon icon="sort"></fa-icon></th>
          <th scope="col" jhiSortBy="coleccion">
            <span jhiTranslate="wiseApp.camiseta.coleccion">Coleccion</span> <fa-icon icon="sort"></fa-icon>
          </th>
          <th scope="col" jhiSortBy="venta.id"><span jhiTranslate="wiseApp.camiseta.venta">Venta</span> <fa-icon icon="sort"></fa-icon></th>
          <th scope="col"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let camiseta of camisetas; trackBy: trackId" data-cy="entityTable">
          <td>
            <a [routerLink]="['/camiseta', camiseta.id, 'view']">{{ camiseta.id }}</a>
          </td>
          <td>{{ camiseta.stock }}</td>
          <td>{{ camiseta.imagen }}</td>
          <td>{{ camiseta.talla }}</td>
          <td>{{ camiseta.color }}</td>
          <td>{{ camiseta.coleccion }}</td>
          <td>
            <div *ngIf="camiseta.venta">
              <a [routerLink]="['/venta', camiseta.venta?.id, 'view']">{{ camiseta.venta?.id }}</a>
            </div>
          </td>
          <td class="text-right">
            <div class="btn-group">
              <button
                type="submit"
                [routerLink]="['/camiseta', camiseta.id, 'view']"
                class="btn btn-info btn-sm"
                data-cy="entityDetailsButton"
              >
                <fa-icon icon="eye"></fa-icon>
                <span class="d-none d-md-inline" jhiTranslate="entity.action.view">View</span>
              </button>

              <button
                type="submit"
                [routerLink]="['/camiseta', camiseta.id, 'edit']"
                class="btn btn-primary btn-sm"
                data-cy="entityEditButton"
              >
                <fa-icon icon="pencil-alt"></fa-icon>
                <span class="d-none d-md-inline" jhiTranslate="entity.action.edit">Edit</span>
              </button>

              <button type="submit" (click)="delete(camiseta)" class="btn btn-danger btn-sm" data-cy="entityDeleteButton">
                <fa-icon icon="times"></fa-icon>
                <span class="d-none d-md-inline" jhiTranslate="entity.action.delete">Delete</span>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="camisetas && camisetas.length > 0">
    <div class="row justify-content-center">
      <jhi-item-count [params]="{ page: page, totalItems: totalItems, itemsPerPage: itemsPerPage }"></jhi-item-count>
    </div>

    <div class="row justify-content-center">
      <ngb-pagination
        [collectionSize]="totalItems"
        [(page)]="ngbPaginationPage"
        [pageSize]="itemsPerPage"
        [maxSize]="5"
        [rotate]="true"
        [boundaryLinks]="true"
        (pageChange)="loadPage($event)"
      ></ngb-pagination>
    </div>
  </div>
</div>
